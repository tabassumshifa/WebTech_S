<!DOCTYPE html>
<html>
<head>
    <title>Lab Task 02 - Functions, Loops, and String Operations</title>
</head>
<body>

<h1>JavaScript Lab Task 02</h1>

<script>
// Function declaration
function calculateSum(a, b)
{
    return a + b;
}

// Function call
let result = calculateSum(10, 20);

// Display result
document.write("<h3>Part A: Function Result</h3>");
document.write("Sum = " + result + "<br><br>");

//Loops
document.write("<h3>Part B: Loops</h3>");

// for loop (1 to 10)
document.write("Numbers from 1 to 10:<br>");
for (let i = 1; i <= 10; i++)
{
    document.write(i + " ");
}

document.write("<br><br>");

// while loop (even numbers 1 to 20)
document.write("Even numbers from 1 to 20:<br>");
let num = 2;

while (num <= 20)
{
    document.write(num + " ");
    num += 2;
}

document.write("<br><br>");

//String Operations

// Declare string
let fullName = "Tabassum Shifa";

// Convert to uppercase
let upperName = fullName.toUpperCase();

// Find length
let nameLength = fullName.length;

// Extract first name
let firstName = fullName.split(" ")[0];

// Display results
document.write("<h3>Part C: String Operations</h3>");
document.write("Full Name: " + fullName + "<br>");
document.write("Uppercase: " + upperName + "<br>");
document.write("Length: " + nameLength + "<br>");
document.write("First Name: " + firstName + "<br><br>");

//Function with User Input
// Function definition
function checkStringLength(inputString)
{
    if (inputString.length > 5)
    {
        document.write("The string length is greater than 5.<br>");
    }
    else
    {
        document.write("The string length is 5 or less.<br>");
    }
}

// Take input
let userInput = prompt("Enter a string:");

// Call function
document.write("<h3>Part D: String Length Check</h3>");
checkStringLength(userInput);

</script>

</body>
</html>
