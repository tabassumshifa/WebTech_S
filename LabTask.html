<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="stylesheet" href="LabTask.CSS">
</head>

<body>
<header>
<h1>Tabassum Shifa</h1>
<p>Computer Science Student | Future Full Stack Developer</p>

<nav>
<a href="#home">Home</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<br>
<button id="modeBtn">Toggle Dark Mode</button>
</header>

<main>

<section id="home">
<h2>About Me</h2>
<p>Hello! I am a Computer Science student. I enjoy building websites and learning programming.</p>
</section>

<section>
<h2>My Projects</h2>
<div id="projects"></div>
</section>

<section id="contact">
<h2>Contact Me</h2>

<form id="contactForm">

<input type="text" id="name" placeholder="Name">
<div class="error" id="nameError"></div>

<input type="email" id="email" placeholder="Email">
<div class="error" id="emailError"></div>

<input type="text" id="subject" placeholder="Subject">
<div class="error" id="subjectError"></div>

<textarea id="message" placeholder="Message"></textarea>
<div class="error" id="messageError"></div>

<button type="submit">Send</button>

</form>
</section>

</main>

<footer>
<p>© 2026 My Portfolio</p>
</footer>

<button id="topBtn">Top</button>
<script src="LabTask.JS"></script>


</body>
</html>
